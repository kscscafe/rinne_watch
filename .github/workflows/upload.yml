name: Upload to App Store
on:
  workflow_dispatch:
jobs:
  upload:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          ls /Applications/Xcode*.app
          sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          xcodebuild -version
      - name: Install iOS provisioning profile
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > /tmp/ios_profile.mobileprovision
          UUID=$(security cms -D -i /tmp/ios_profile.mobileprovision | plutil -extract UUID raw -)
          NAME=$(security cms -D -i /tmp/ios_profile.mobileprovision | plutil -extract Name raw -)
          cp /tmp/ios_profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/${UUID}.mobileprovision"
          echo "Installed iOS profile: ${NAME} (${UUID})"
      - name: Install watchOS provisioning profile
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > /tmp/watch_profile.mobileprovision
          UUID=$(security cms -D -i /tmp/watch_profile.mobileprovision | plutil -extract UUID raw -)
          NAME=$(security cms -D -i /tmp/watch_profile.mobileprovision | plutil -extract Name raw -)
          cp /tmp/watch_profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/${UUID}.mobileprovision"
          echo "Installed watchOS profile: ${NAME} (${UUID})"
      - name: Import certificate
        run: |
          echo "${{ secrets.CERTIFICATE_P12 }}" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "1234" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
      - name: Prepare App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          printf "%s" "${{ secrets.APP_STORE_KEY }}" > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8
          ls -la ~/.private_keys/
      - name: Archive iOS app (embeds watchOS)
        run: |
          xcodebuild archive \
            -project "rinne_watch.xcodeproj" \
            -scheme "rinne_iOS" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/rinne_iOS.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_ISSUER_ID }} \
            DEVELOPMENT_TEAM=6736RV7AWW \
            CODE_SIGN_STYLE=Automatic
      - name: Verify archive
        run: |
          ls -la build/rinne_iOS.xcarchive/Products/Applications/
          echo "Embedded watch app:"
          ls -la "build/rinne_iOS.xcarchive/Products/Applications/Rinne Sleep.app/Watch/" || true
      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>6736RV7AWW</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.officees.rinnewatch</key>
              <string>rinne_ios_appstore</string>
              <key>com.officees.rinnewatch.watchkitapp</key>
              <string>rinne_watch_appstore</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/rinne_iOS.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist /tmp/ExportOptions.plist
          ls -la build/export
      - name: Upload to App Store Connect
        run: |
          mkdir -p ~/.private_keys
          printf "%s" "${{ secrets.APP_STORE_KEY }}" > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_KEY_ID }}.p8
          IPA_PATH=$(ls build/export/*.ipa | head -n 1)
          echo "Uploading: $IPA_PATH"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey ${{ secrets.APP_STORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_ISSUER_ID }}
