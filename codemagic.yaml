workflows:
  watchos-app-store:
    name: watchOS App Store
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      groups:
        - app_store_connect
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Add cert to keychain
        script: |
          echo $CERTIFICATE_PRIVATE_KEY | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password 1234
      - name: Install provisioning profile
        script: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(security cms -D -i rinne_watch_appstore.mobileprovision | plutil -extract UUID raw -)
          cp rinne_watch_appstore.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/${UUID}.mobileprovision"
      - name: Archive
        script: |
          xcodebuild archive \
            -project "rinne_watch.xcodeproj" \
            -scheme "rinne_watch Watch App" \
            -configuration Release \
            -destination "generic/platform=watchOS" \
            -archivePath build/rinne_watch.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER=rinne_watch_appstore \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=6736RV7AWW
      - name: Upload to App Store Connect
        script: |
          app-store-connect publish \
            --path build/rinne_watch.xcarchive \
            --api-key $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --private-key $APP_STORE_CONNECT_PRIVATE_KEY
    artifacts:
      - build/rinne_watch.xcarchive
