workflows:
  watchos-app-store:
    name: watchOS App Store
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      groups:
        - app_store_connect
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Add certs to keychain
        script: |
          echo $CERTIFICATE_PRIVATE_KEY | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password 1234
      - name: Install provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          cp /Users/builder/clone/rinne_watch_appstore.mobileprovision "$PROFILES_HOME/" 2>/dev/null || true
      - name: Archive
        script: |
          xcodebuild archive \
            -project "rinne_watch.xcodeproj" \
            -scheme "rinne_watch Watch App" \
            -configuration Release \
            -destination "generic/platform=watchOS" \
            -archivePath build/rinne_watch.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=6736RV7AWW \
            -allowProvisioningUpdates
      - name: Export
        script: |
          xcodebuild -exportArchive \
            -archivePath build/rinne_watch.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates
    artifacts:
      - build/export/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
